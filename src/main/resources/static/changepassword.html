<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Change Password — Elysiae</title>
<script src="js/toggles.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        primary: {
          50: '#f0fdfa', 100: '#ccfbf1', 200: '#99f6e4', 300: '#5eead4',
          400: '#2dd4bf', 500: '#14b8a6', 600: '#0d9488', 700: '#0f766e',
          800: '#115e59', 900: '#134e4a'
        }
      },
      fontFamily: {
        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif']
      }
    }
  }
}
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body class="login-bg">
<div class="page-loader" id="loader"><div class="loader-spin"></div></div>

<div class="login-page anim-fade-in">
  <div class="w-full max-w-[420px]">
    <div class="text-center mb-8 anim-slide-up">
      <div class="relative inline-flex mb-3">
        <div class="absolute inset-0 bg-primary-400/15 blur-3xl rounded-full scale-150"></div>
        <div class="text-3xl md:text-4xl font-extrabold tracking-tight gradient-text relative">Elysiae</div>
      </div>
      <p class="text-sm text-slate-500 dark:text-slate-400">Set a new password to continue</p>
    </div>

    <div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-[0_8px_30px_rgba(0,0,0,0.06)] dark:shadow-[0_8px_30px_rgba(0,0,0,0.3)] p-8 anim-slide-up" style="animation-delay:80ms">
      <div class="alert alert-warning" style="margin-bottom:1.25rem">Your password must be changed before continuing.</div>
      <form id="cp-form">
        <div class="flex flex-col gap-5">
          <div class="form-group">
            <label class="form-label" for="cp-old">Current Password</label>
            <div class="relative">
              <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <input type="password" id="cp-old" class="form-input pl-10" placeholder="Current password" autocomplete="current-password" required>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="cp-new">New Password</label>
            <div class="relative">
              <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <input type="password" id="cp-new" class="form-input pl-10" placeholder="New password (min 6 characters)" autocomplete="new-password" required minlength="6">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="cp-confirm">Confirm New Password</label>
            <div class="relative">
              <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <input type="password" id="cp-confirm" class="form-input pl-10" placeholder="Re-enter new password" autocomplete="new-password" required minlength="6">
            </div>
          </div>
          <button type="submit" id="cp-btn" class="w-full inline-flex items-center justify-center gap-2 px-6 py-3 rounded-lg text-base font-medium text-white bg-primary-600 hover:bg-primary-700 transition-all shadow-sm hover:shadow-md hover:-translate-y-0.5 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:translate-y-0">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            Change Password
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
window.addEventListener('load', function() { setTimeout(function() { document.getElementById('loader').classList.add('hidden'); }, 300); });

document.addEventListener('DOMContentLoaded', function() {
  var form = document.getElementById('cp-form');
  var btn = document.getElementById('cp-btn');

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    var oldPw = document.getElementById('cp-old').value;
    var newPw = document.getElementById('cp-new').value;
    var confirmPw = document.getElementById('cp-confirm').value;

    if (newPw !== confirmPw) {
      window.showToast('Passwords do not match', 'error');
      return;
    }
    if (newPw.length < 6) {
      window.showToast('Password must be at least 6 characters', 'error');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Changing...';

    Auth.changePassword(oldPw, newPw).then(function(user) {
      localStorage.setItem('elysiae-user', JSON.stringify(user));
      window.showToast('Password changed successfully! Redirecting...', 'success');
      setTimeout(function() {
        window.location.href = 'dashboard/dashboard.html';
      }, 1000);
    }).catch(function(err) {
      window.showToast(err.message || 'Failed to change password', 'error');
      btn.disabled = false;
      btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>\n            Change Password';
    });
  });
});
</script>
</body>
</html>
