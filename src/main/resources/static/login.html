<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in â€” Elysiae</title>
<script src="js/toggles.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: { extend: {
    colors: { primary: { 50: '#f0fdfa', 100: '#ccfbf1', 200: '#99f6e4', 300: '#5eead4', 400: '#2dd4bf', 500: '#14b8a6', 600: '#0d9488', 700: '#0f766e', 800: '#115e59', 900: '#134e4a' } } },
    fontFamily: { sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'] }
  } }
}
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="page-loader" id="loader"><div class="loader-spin"></div></div>

<div class="login-page anim-fade-in">
  <div class="w-full max-w-[420px]">
    <div class="text-center mb-8 anim-slide-up">
      <a href="/" class="text-2xl font-extrabold tracking-tight text-slate-900 dark:text-white">elysiae</a>
      <p class="text-sm text-slate-500 dark:text-slate-400 mt-2">Sign in to your account</p>
    </div>

    <div class="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm p-8">
      <form id="login-form">
        <div class="flex flex-col gap-4">
          <div class="form-group">
            <label class="form-label" for="email">Email address</label>
            <input type="email" id="email" class="form-input" placeholder="you@hospital.com" autocomplete="email" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" id="password" class="form-input" placeholder="Enter your password" autocomplete="current-password" required>
          </div>
          <div class="flex items-center justify-between">
            <label class="flex items-center gap-2 text-sm text-slate-500 dark:text-slate-400 cursor-pointer">
              <input type="checkbox" class="accent-primary-600 w-4 h-4 rounded border-slate-300 dark:border-slate-600">
              Remember me
            </label>
            <a href="#" class="text-sm font-medium text-primary-600 dark:text-primary-400 hover:underline">Forgot password?</a>
          </div>
          <button type="submit" id="login-btn" class="w-full mt-1 inline-flex items-center justify-center gap-2 px-6 py-3 rounded-lg text-base font-medium text-white bg-primary-600 hover:bg-primary-700 transition-colors shadow-sm disabled:opacity-50 disabled:cursor-not-allowed">Sign in</button>
          <div id="login-error" class="hidden text-sm text-center text-red-500 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-900/30 rounded-lg px-3 py-2.5"></div>
        </div>
      </form>
      <div class="text-center mt-6 pt-6 border-t border-slate-100 dark:border-slate-700">
        <a href="index.html" class="inline-flex items-center gap-1.5 text-sm text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          Back to home
        </a>
      </div>
    </div>

    <div class="text-center mt-6">
      <button class="w-9 h-9 inline-flex items-center justify-center rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors theme-btn" id="theme-toggle">
        <span class="light-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></span>
        <span class="dark-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span>
      </button>
    </div>
  </div>
</div>

<script>
window.addEventListener('load', function() { setTimeout(function() { document.getElementById('loader').classList.add('hidden'); }, 300); });
</script>
</body>
</html>
